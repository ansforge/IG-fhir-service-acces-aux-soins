name: Workflow CI-build (GitHub pages)
on:
  workflow_call:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  run-gitHubPages:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ansforge/fhir-ig-builder:latest
    steps:
      - uses: actions/checkout@v4
        with:      
          path: igSource

      - name: Copy "all" to "use cases" specs
        shell: bash
        run: |
             path_spec="./igSource/input/pagecontent"
             for lines in $(cat "${path_spec}/specifications_techniques.txt"); do
               files=(${lines//;/ })
               cp "${path_spec}/${files[0]}" "${path_spec}/${files[1]}"
             done

      - uses: ansforge/IG-workflows@main
        with:      
          bake: "true"
          validator_cli: "false"     
          generate_plantuml : "true"
          repo_ig: "./igSource"   
          github_page: "true"
          github_page_token: ${{ secrets.ANS_IG_API_TOKEN  }}
          container_mode: "true"
